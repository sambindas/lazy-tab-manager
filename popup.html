<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lazy Tab Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      width: 360px;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    /* ── Header ── */
    header {
      background: #16213e;
      padding: 12px 14px 10px;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 14px; font-weight: 700; color: #e94560; }
    header p  { font-size: 11px; color: #666; margin-top: 1px; }

    .header-left { display: flex; flex-direction: column; }

    /* ── Debt summary ── */
    .debt-bar {
      background: #16213e;
      padding: 10px 14px;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .debt-total {
      display: flex;
      flex-direction: column;
    }

    .debt-total .label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.6px; }
    .debt-total .value { font-size: 26px; font-weight: 800; line-height: 1; }
    .debt-total .value.low    { color: #4caf50; }
    .debt-total .value.medium { color: #ff9800; }
    .debt-total .value.high   { color: #e94560; }

    .debt-actions {
      display: flex;
      flex-direction: column;
      gap: 5px;
      align-items: flex-end;
    }

    .btn-archive {
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-archive:hover { background: #c73652; }
    .btn-archive:disabled { background: #444; cursor: default; }

    .btn-view-archive {
      background: none;
      border: none;
      color: #666;
      font-size: 11px;
      cursor: pointer;
      text-decoration: underline;
      text-align: right;
    }
    .btn-view-archive:hover { color: #aaa; }

    /* ── Tabs ── */
    .tabs-header {
      padding: 8px 14px 4px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: #444;
      display: flex;
      justify-content: space-between;
    }

    .tab-list {
      max-height: 320px;
      overflow-y: auto;
    }

    .tab-list::-webkit-scrollbar { width: 4px; }
    .tab-list::-webkit-scrollbar-track { background: transparent; }
    .tab-list::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 4px; }

    .tab-item {
      padding: 8px 14px;
      border-bottom: 1px solid #0f3460;
      cursor: pointer;
      transition: background 0.1s;
    }
    .tab-item:hover { background: #16213e; }
    .tab-item:last-child { border-bottom: none; }

    .tab-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }

    .tab-favicon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      border-radius: 2px;
    }

    .tab-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 12px;
      color: #ccc;
    }

    .tab-score {
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
      min-width: 30px;
      text-align: right;
    }
    .tab-score.low    { color: #4caf50; }
    .tab-score.medium { color: #ff9800; }
    .tab-score.high   { color: #e94560; }

    /* Score breakdown pills */
    .tab-breakdown {
      display: flex;
      gap: 5px;
      padding-left: 22px;
    }

    .pill {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 10px;
      background: #0f3460;
      color: #888;
    }
    .pill.active { color: #e0e0e0; background: #1a3a6e; }
    .pill.dup { color: #e94560; background: #2a1020; }

    .empty-state {
      padding: 24px 14px;
      text-align: center;
      color: #444;
      font-size: 12px;
    }

    /* ── Settings footer ── */
    .section {
      padding: 10px 14px;
      border-top: 1px solid #0f3460;
    }

    .section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: #e94560;
      margin-bottom: 8px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .row:last-child { margin-bottom: 0; }

    label { color: #aaa; font-size: 12px; }

    .toggle { position: relative; display: inline-block; width: 32px; height: 18px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #333; border-radius: 18px; cursor: pointer; transition: background 0.2s; }
    .slider::before { content: ""; position: absolute; height: 12px; width: 12px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
    input:checked + .slider { background: #e94560; }
    input:checked + .slider::before { transform: translateX(14px); }

    .input-group { display: flex; align-items: center; gap: 5px; margin-top: 4px; }
    .input-group input[type="number"] { width: 52px; padding: 3px 5px; border: 1px solid #0f3460; border-radius: 5px; background: #0f3460; color: #e0e0e0; font-size: 12px; text-align: center; outline: none; }
    .input-group input[type="number"]:focus { border-color: #e94560; }
    .input-group span { font-size: 11px; color: #666; }
    .disabled-group { opacity: 0.4; pointer-events: none; }

    .footer-row {
      padding: 8px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid #0f3460;
    }

    .btn-save { background: #e94560; color: #fff; border: none; border-radius: 5px; padding: 5px 14px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .btn-save:hover { background: #c73652; }
    .btn-options { background: none; border: none; color: #555; font-size: 11px; cursor: pointer; text-decoration: underline; }
    .btn-options:hover { color: #aaa; }
    #saved-msg { font-size: 11px; color: #4caf50; opacity: 0; transition: opacity 0.3s; }
    #saved-msg.show { opacity: 1; }

    #archive-msg { font-size: 11px; color: #4caf50; text-align: center; padding: 4px 0; display: none; }
    #archive-msg.show { display: block; }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <h1>Lazy Tab Manager</h1>
      <p id="tab-count">Loading...</p>
    </div>
  </header>

  <!-- Tab Debt Summary -->
  <div class="debt-bar">
    <div class="debt-total">
      <span class="label">Tab Debt</span>
      <span class="value" id="debt-value">—</span>
    </div>
    <div class="debt-actions">
      <button class="btn-archive" id="btn-archive">Archive stale tabs</button>
      <button class="btn-view-archive" id="btn-view-archive">View archive</button>
    </div>
  </div>

  <div id="archive-msg">Tabs archived successfully!</div>

  <!-- Tab list -->
  <div class="tabs-header">
    <span>Tabs by debt score</span>
    <span id="stale-count"></span>
  </div>

  <div class="tab-list" id="tab-list">
    <div class="empty-state">Loading tabs...</div>
  </div>

  <!-- Settings -->
  <div class="section">
    <div class="section-title">Suspend Inactive Tabs</div>
    <div class="row">
      <label for="suspend-toggle">Enable auto-suspend</label>
      <label class="toggle"><input type="checkbox" id="suspend-toggle" /><span class="slider"></span></label>
    </div>
    <div class="input-group" id="suspend-group">
      <span>After</span>
      <input type="number" id="suspend-minutes" min="1" max="1440" value="30" />
      <span>min inactive</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Auto-Close Inactive Tabs</div>
    <div class="row">
      <label for="close-toggle">Enable auto-close</label>
      <label class="toggle"><input type="checkbox" id="close-toggle" /><span class="slider"></span></label>
    </div>
    <div class="input-group" id="close-group">
      <span>After</span>
      <input type="number" id="close-minutes" min="1" max="10080" value="120" />
      <span>min inactive</span>
    </div>
  </div>

  <div class="footer-row">
    <button class="btn-options" id="btn-options">More options</button>
    <span id="saved-msg">Saved!</span>
    <button class="btn-save" id="btn-save">Save</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
