<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lazy Tab Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      width: 300px;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    header {
      background: #16213e;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #0f3460;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #e94560;
      letter-spacing: 0.3px;
    }

    header p {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    .section {
      padding: 14px 16px;
      border-bottom: 1px solid #0f3460;
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #e94560;
      margin-bottom: 10px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .row:last-child { margin-bottom: 0; }

    label { color: #ccc; }

    /* Toggle switch */
    .toggle { position: relative; display: inline-block; width: 36px; height: 20px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #444; border-radius: 20px;
      cursor: pointer; transition: background 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      height: 14px; width: 14px;
      left: 3px; bottom: 3px;
      background: #fff; border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #e94560; }
    input:checked + .slider::before { transform: translateX(16px); }

    /* Number input */
    .input-group {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
    }

    .input-group input[type="number"] {
      width: 64px;
      padding: 4px 6px;
      border: 1px solid #0f3460;
      border-radius: 6px;
      background: #0f3460;
      color: #e0e0e0;
      font-size: 13px;
      text-align: center;
      outline: none;
    }

    .input-group input[type="number"]:focus { border-color: #e94560; }

    .input-group span { font-size: 12px; color: #888; }

    .disabled-group { opacity: 0.4; pointer-events: none; }

    footer {
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn-save {
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-save:hover { background: #c73652; }

    .btn-options {
      background: none;
      border: none;
      color: #888;
      font-size: 12px;
      cursor: pointer;
      text-decoration: underline;
    }
    .btn-options:hover { color: #e0e0e0; }

    #saved-msg {
      font-size: 12px;
      color: #4caf50;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #saved-msg.show { opacity: 1; }
  </style>
</head>
<body>
  <header>
    <h1>Lazy Tab Manager</h1>
    <p>Keep your tabs under control</p>
  </header>

  <!-- Suspend settings -->
  <div class="section">
    <div class="section-title">Suspend Inactive Tabs</div>
    <div class="row">
      <label for="suspend-toggle">Enable auto-suspend</label>
      <label class="toggle">
        <input type="checkbox" id="suspend-toggle" />
        <span class="slider"></span>
      </label>
    </div>
    <div class="input-group" id="suspend-group">
      <span>Suspend after</span>
      <input type="number" id="suspend-minutes" min="1" max="1440" value="30" />
      <span>min of inactivity</span>
    </div>
  </div>

  <!-- Auto-close settings -->
  <div class="section">
    <div class="section-title">Auto-Close Inactive Tabs</div>
    <div class="row">
      <label for="close-toggle">Enable auto-close</label>
      <label class="toggle">
        <input type="checkbox" id="close-toggle" />
        <span class="slider"></span>
      </label>
    </div>
    <div class="input-group" id="close-group">
      <span>Close after</span>
      <input type="number" id="close-minutes" min="1" max="10080" value="120" />
      <span>min of inactivity</span>
    </div>
  </div>

  <footer>
    <button class="btn-options" id="btn-options">More options</button>
    <span id="saved-msg">Saved!</span>
    <button class="btn-save" id="btn-save">Save</button>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
