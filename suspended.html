<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tab Suspended</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      text-align: center;
      max-width: 480px;
      padding: 48px 40px;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 16px;
    }

    .zzz {
      font-size: 56px;
      line-height: 1;
      margin-bottom: 20px;
      letter-spacing: -4px;
      color: #e94560;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #e0e0e0;
      margin-bottom: 8px;
    }

    .url {
      font-size: 13px;
      color: #888;
      word-break: break-all;
      margin-bottom: 8px;
      max-height: 60px;
      overflow: hidden;
    }

    .title-text {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 28px;
      font-style: italic;
    }

    .btn-restore {
      display: inline-block;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 36px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      text-decoration: none;
    }

    .btn-restore:hover {
      background: #c73652;
      transform: translateY(-1px);
    }

    .btn-restore:active {
      transform: translateY(0);
    }

    .meta {
      margin-top: 24px;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="zzz">zzz</div>
    <h1>Tab Suspended</h1>
    <p class="title-text" id="page-title">Loading...</p>
    <p class="url" id="page-url"></p>
    <button class="btn-restore" id="btn-restore">Wake up tab</button>
    <p class="meta" id="suspended-time"></p>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const url = params.get('url') || '';
    const title = params.get('title') || url;
    const suspendedAt = params.get('at');

    // Update page title in browser tab
    document.title = title ? `[Suspended] ${title}` : 'Tab Suspended';

    document.getElementById('page-title').textContent = title || '(no title)';
    document.getElementById('page-url').textContent = url || '(no URL)';

    if (suspendedAt) {
      const ts = parseInt(suspendedAt, 10);
      if (!isNaN(ts)) {
        const date = new Date(ts);
        document.getElementById('suspended-time').textContent =
          `Suspended at ${date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
      }
    }

    const btn = document.getElementById('btn-restore');
    if (url) {
      // Use an anchor navigate — most reliable cross-browser on extension pages
      btn.addEventListener('click', () => {
        window.location.replace(url);
      });
    } else {
      btn.disabled = true;
      btn.textContent = 'No URL to restore';
    }
  </script>
</body>
</html>
